services:
  cli-proxy-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.runtime
    image: ${CLI_PROXY_IMAGE:-cliproxy-api:local}
    container_name: cli-proxy-api
    restart: unless-stopped
    working_dir: /CLIProxyAPI
    environment:
      MANAGEMENT_STATIC_PATH: /CLIProxyAPI/static
    volumes:
      - ${CLI_PROXY_CONFIG_PATH:-./config.yaml}:/CLIProxyAPI/config.yaml:ro
      - ${CLI_PROXY_AUTH_PATH:-./auths}:/CLIProxyAPI/auths
      - ${CLI_PROXY_STATIC_PATH:-./static}:/CLIProxyAPI/static:ro
      - ${CLI_PROXY_LOG_PATH:-./logs}:/CLIProxyAPI/logs
    ports:
      - "${CLI_PROXY_PORT:-8317}:8317"

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: unless-stopped
    depends_on:
      - cli-proxy-api
    ports:
      - "${CLIPROXY_NGINX_PORT:-80}:80"
    volumes:
      - ./docker/nginx/cliproxy.conf:/etc/nginx/conf.d/default.conf:ro
